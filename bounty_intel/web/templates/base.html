<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}Bounty Intel{% endblock %}</title>
<script src="https://unpkg.com/htmx.org@1.9.12"></script>
<style>
  :root {
    --bg: #0f1117; --sidebar-bg: #0a0c10; --card: #1a1d27; --border: #2a2d3a;
    --text: #e1e4ed; --muted: #8b8fa3; --accent: #6366f1;
    --green: #22c55e; --red: #ef4444; --yellow: #eab308; --blue: #3b82f6;
    --purple: #a855f7; --orange: #f97316;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }

  /* Layout */
  .layout { display: flex; min-height: 100vh; }
  .sidebar { width: 220px; background: var(--sidebar-bg); border-right: 1px solid var(--border); padding: 1.5rem 0; position: fixed; height: 100vh; overflow-y: auto; }
  .main { margin-left: 220px; flex: 1; padding: 2rem; min-height: 100vh; }

  /* Sidebar */
  .sidebar-brand { padding: 0 1.2rem 1.5rem; font-size: 1.1rem; font-weight: 700; color: var(--accent); border-bottom: 1px solid var(--border); margin-bottom: 1rem; }
  .sidebar-brand small { display: block; font-size: 0.7rem; font-weight: 400; color: var(--muted); margin-top: 2px; }
  .nav-section { padding: 0.5rem 1.2rem; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; color: var(--muted); letter-spacing: 0.05em; }
  .nav-link { display: flex; align-items: center; gap: 0.6rem; padding: 0.5rem 1.2rem; color: var(--muted); text-decoration: none; font-size: 0.88rem; transition: all 0.15s; border-left: 2px solid transparent; }
  .nav-link:hover { color: var(--text); background: rgba(99,102,241,0.05); }
  .nav-link.active { color: var(--accent); border-left-color: var(--accent); background: rgba(99,102,241,0.08); }
  .nav-icon { width: 18px; text-align: center; }
  .nav-badge { margin-left: auto; background: var(--accent); color: white; font-size: 0.65rem; padding: 1px 6px; border-radius: 10px; font-weight: 600; }

  /* Content */
  .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
  .page-header h1 { font-size: 1.6rem; }
  .page-header .actions { display: flex; gap: 0.5rem; }

  /* Cards */
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1rem; margin: 1rem 0; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1.2rem; }
  .card-value { font-size: 2rem; font-weight: 700; }
  .card-label { color: var(--muted); font-size: 0.85rem; margin-top: 0.3rem; }

  /* Tables */
  table { width: 100%; border-collapse: collapse; margin: 1rem 0; }
  th, td { padding: 0.6rem 0.8rem; text-align: left; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
  th { color: var(--muted); font-weight: 600; font-size: 0.8rem; text-transform: uppercase; }
  tr:hover { background: rgba(99,102,241,0.05); }

  /* Badges */
  .badge { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 0.75rem; font-weight: 600; }
  .badge-green { background: rgba(34,197,94,0.15); color: var(--green); }
  .badge-red { background: rgba(239,68,68,0.15); color: var(--red); }
  .badge-yellow { background: rgba(234,179,8,0.15); color: var(--yellow); }
  .badge-blue { background: rgba(59,130,246,0.15); color: var(--blue); }
  .badge-purple { background: rgba(168,85,247,0.15); color: var(--purple); }
  .badge-orange { background: rgba(249,115,22,0.15); color: var(--orange); }
  .badge-gray { background: rgba(139,143,163,0.15); color: var(--muted); }

  /* Buttons */
  .btn { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.5rem 1rem; border-radius: 8px; border: 1px solid var(--border); background: var(--card); color: var(--text); font-size: 0.85rem; cursor: pointer; transition: all 0.15s; text-decoration: none; }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: white; }
  .btn-primary:hover { opacity: 0.9; color: white; }
  .btn-danger { border-color: var(--red); color: var(--red); }
  .btn-danger:hover { background: rgba(239,68,68,0.1); }
  .btn-sm { padding: 0.3rem 0.6rem; font-size: 0.8rem; }

  /* Insight boxes */
  .insight-box { background: var(--card); border-left: 3px solid var(--accent); border-radius: 0 8px 8px 0; padding: 1rem 1.2rem; margin: 1rem 0; }
  .insight-box.warn { border-left-color: var(--yellow); }
  .insight-box.good { border-left-color: var(--green); }
  .insight-box.bad { border-left-color: var(--red); }

  /* Scenario table */
  .scenario-table td:nth-child(2), .scenario-table td:nth-child(3) { text-align: right; font-family: 'SF Mono', monospace; }
  .scenario-table th:nth-child(2), .scenario-table th:nth-child(3) { text-align: right; }

  /* Expandable rows */
  tr.expandable { cursor: pointer; }
  tr.expandable:hover { background: rgba(99,102,241,0.08); }
  tr.expandable td:first-child::before { content: '\25B6'; display: inline-block; margin-right: 0.3rem; font-size: 0.6rem; transition: transform 0.15s; color: var(--muted); }
  tr.expandable.open td:first-child::before { transform: rotate(90deg); }
  tr.detail-row { display: none; }
  tr.detail-row.open { display: table-row; }
  .detail-panel { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 1rem 1.2rem; font-size: 0.85rem; }

  /* Progress bars (funnel) */
  .progress-row { display: flex; align-items: center; gap: 0.5rem; margin: 0.5rem 0; }
  .progress-label { width: 100px; font-size: 0.85rem; color: var(--muted); }
  .progress-bar { flex: 1; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 4px; }

  /* Tabs */
  .tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 1.5rem; gap: 0; }
  .tab { padding: 0.6rem 1.2rem; color: var(--muted); text-decoration: none; font-size: 0.9rem; border-bottom: 2px solid transparent; cursor: pointer; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* Pipeline columns */
  .pipeline { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; }
  .pipeline-col { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1rem; min-height: 200px; }
  .pipeline-col h3 { font-size: 0.85rem; color: var(--muted); text-transform: uppercase; margin-bottom: 0.8rem; display: flex; justify-content: space-between; }
  .pipeline-card { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 0.8rem; margin-bottom: 0.6rem; }
  .pipeline-card:hover { border-color: var(--accent); }
  .pipeline-card .title { font-size: 0.85rem; font-weight: 500; margin-bottom: 0.3rem; }
  .pipeline-card .meta { font-size: 0.75rem; color: var(--muted); }

  /* Split pane for report editor */
  .split-pane { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; height: calc(100vh - 200px); }
  .split-pane textarea { width: 100%; height: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.85rem; padding: 1rem; resize: none; }
  .split-pane textarea:focus { outline: none; border-color: var(--accent); }
  .preview-pane { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 1.5rem; overflow-y: auto; }
  .preview-pane h1 { font-size: 1.3rem; margin-bottom: 0.5rem; }
  .preview-pane h2 { font-size: 1.1rem; color: var(--accent); margin-top: 1.2rem; }
  .preview-pane code { background: var(--bg); padding: 1px 4px; border-radius: 3px; font-size: 0.85em; }
  .preview-pane pre { background: var(--bg); padding: 1rem; border-radius: 6px; overflow-x: auto; margin: 0.8rem 0; }

  /* Filters */
  .filters { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
  .filter-select { background: var(--card); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 0.4rem 0.8rem; font-size: 0.85rem; }

  /* HTMX loading indicator */
  .htmx-indicator { opacity: 0; transition: opacity 0.2s; }
  .htmx-request .htmx-indicator { opacity: 1; }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Monospace values */
  .mono { font-family: 'SF Mono', 'Fira Code', monospace; }

  /* Responsive */
  @media (max-width: 768px) {
    .sidebar { display: none; }
    .main { margin-left: 0; }
    .grid { grid-template-columns: 1fr; }
    .split-pane { grid-template-columns: 1fr; }
  }

  /* Colors */
  .green { color: var(--green); } .red { color: var(--red); }
  .yellow { color: var(--yellow); } .blue { color: var(--blue); }
  .accent { color: var(--accent); } .muted { color: var(--muted); }

  /* Company logos */
  .company-logo { width:24px; height:24px; border-radius:6px; object-fit:contain; background:var(--surface); flex-shrink:0; }
  .company-logo-sm { width:18px; height:18px; border-radius:4px; vertical-align:middle; }
  .company-logo-lg { width:32px; height:32px; border-radius:8px; }
  .logo-fallback { width:24px; height:24px; border-radius:6px; background:var(--accent); color:#fff; font-weight:700; font-size:0.75rem; align-items:center; justify-content:center; flex-shrink:0; text-transform:uppercase; }
  .logo-fallback-lg { width:32px; height:32px; font-size:1rem; border-radius:8px; }

  {% block extra_css %}{% endblock %}
</style>
</head>
<body>
<div class="layout">
  <nav class="sidebar">
    <div class="sidebar-brand">
      Bounty Intel
      <small>julioxus</small>
    </div>

    <div class="nav-section">Overview</div>
    <a href="/" class="nav-link {% if active_page == 'dashboard' %}active{% endif %}">
      <span class="nav-icon">$</span> Dashboard
    </a>
    <a href="/programs" class="nav-link {% if active_page == 'programs' %}active{% endif %}">
      <span class="nav-icon">#</span> Programs
    </a>

    <div class="nav-section" style="margin-top: 1rem;">Research</div>
    <a href="/reports" class="nav-link {% if active_page == 'reports' %}active{% endif %}">
      <span class="nav-icon">&gt;</span> Reports
      {% if report_count %}<span class="nav-badge">{{ report_count }}</span>{% endif %}
    </a>

    <div class="nav-section" style="margin-top: 1rem;">Tracking</div>
    <a href="/submissions" class="nav-link {% if active_page == 'submissions' %}active{% endif %}">
      <span class="nav-icon">^</span> Submissions
    </a>
    <a href="/hunt" class="nav-link {% if active_page == 'hunt' %}active{% endif %}">
      <span class="nav-icon">~</span> Hunt Intel
    </a>

    <div class="nav-section" style="margin-top: 1rem;">System</div>
    <a href="/activity" class="nav-link {% if active_page == 'activity' %}active{% endif %}">
      <span class="nav-icon">@</span> Activity
    </a>
    <a href="/recommendations" class="nav-link {% if active_page == 'recommendations' %}active{% endif %}">
      <span class="nav-icon">*</span> Recommendations
    </a>
    <a href="/settings" class="nav-link {% if active_page == 'settings' %}active{% endif %}">
      <span class="nav-icon">%</span> Settings
    </a>

    <div style="position:absolute;bottom:1rem;left:0;right:0;padding:0 1.2rem">
      <a href="/logout" class="nav-link" style="color:var(--red);font-size:0.8rem">
        <span class="nav-icon">x</span> Logout
      </a>
    </div>
  </nav>

  <main class="main">
    {% block content %}{% endblock %}
  </main>
</div>

<script>
// Expandable table rows
document.addEventListener('click', function(e) {
  const row = e.target.closest('tr.expandable');
  if (!row) return;
  row.classList.toggle('open');
  const detail = row.nextElementSibling;
  if (detail && detail.classList.contains('detail-row')) {
    detail.classList.toggle('open');
  }
});
</script>
{% block extra_js %}{% endblock %}
</body>
</html>
