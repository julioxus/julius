<!DOCTYPE html>
<html>
<head>
<style>
  body { width: 280px; padding: 16px; font-family: -apple-system, sans-serif; background: #0f1117; color: #e1e4ed; }
  h3 { margin: 0 0 12px; font-size: 14px; }
  .status { font-size: 12px; padding: 8px; border-radius: 6px; margin-top: 8px; }
  .ok { background: rgba(34,197,94,0.15); color: #22c55e; }
  .err { background: rgba(239,68,68,0.15); color: #ef4444; }
  .loading { background: rgba(99,102,241,0.15); color: #6366f1; }
  button { width: 100%; padding: 10px; background: #6366f1; color: white; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
  button:hover { opacity: 0.9; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .muted { color: #8b8fa3; font-size: 11px; margin-top: 8px; }
</style>
</head>
<body>
  <h3>Bounty Intel</h3>
  <button id="sync-btn" onclick="syncIntigriti()">Sync Intigriti Now</button>
  <div id="status"></div>
  <div class="muted">Reads cookie from app.intigriti.com and syncs with your dashboard.</div>

  <script src="popup.js"></script>
</body>
</html>
